<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Web</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
}

/* Fuente personalizada */
@font-face {
    font-family: "MiFuente";
    src: url("fuente.woff");
}

h1 {
    font-family: "MiFuente";
}
</style>

</head>

<body>

<h1>Amelie Carrillo García</h1>

<!-- Imagen -->
<h2>Imagen</h2>
<img src="foto.jpg" width="300">

<!-- GIF -->
<h2>GIF</h2>
<img src="animacion.gif" width="300">

<!-- Audio -->
<h2>Audio</h2>
<audio controls>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- Video YouTube -->
<h2>Video</h2>
<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEO_ID">
</iframe>

</html>
